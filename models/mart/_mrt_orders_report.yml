version: 2

models:
  - name: mrt_orders_report
    description: '{{ doc("mrt_orders_report") }}'
    columns:
      - name: order_item_id
        description: "Primary key of the order_item table."
        tests:
          - unique
          - not_null
      - name: order_id
        description: "Foreign key to the orders table."
        tests:
          - not_null
      - name: store_id
        description: "Foreign key to the stores table."
        tests:
          - not_null
      - name: product_id
        description: "Foreign key to the products table."
        tests:
          - not_null
      - name: staff_id
        description: "Foreign key to the staffs table."
        tests:
          - not_null
      - name: order_status_label
        description: "Readable order status."
      - name: is_completed
        description: "TRUE if the order is completed (status 4)."
      - name: sales_amount
        description: "Revenue for the line: quantity * list_price * (1 - discount)."
      - name: discount_amount
        description: "Discount granted on the line: quantity * list_price * discount."