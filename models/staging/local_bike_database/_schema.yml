version: 2

models:

  - name: stg_local_bike_database__brands
    description: "This model contains the dictionary of brands."
    columns:
      - name: brand_id
        description: "Primary key of the brands table."
        tests:
            - unique
            - not_null

  - name: stg_local_bike_database__categories
    description: "This model contains the dictionary of product categories."
    columns:
      - name: category_id
        description: "Primary key of the product categories table."
        tests:
            - unique
            - not_null
      - name: category_name
        description: "Name of the product category."
        tests:
          - not_null
          - accepted_values:
              arguments:
                name: accepted_values_stg_categories_category_name
                values: ['Children Bicycles', 'Comfort Bicycles', 'Cruisers Bicycles', 'Cyclocross Bicycles', 'Electric Bikes', 'Mountain Bikes', 'Road Bikes']

  - name: stg_local_bike_database__customers
    description: "This model contains the list of customers."
    columns:
      - name: customer_id
        description: "Primary key of the customers table."
        tests:
            - unique
            - not_null

  - name: stg_local_bike_database__order_items
    description: "This model contains the list of order items."
    columns:
      - name: order_item_id
        description: "Primary key of the order items table."
        tests:
            - unique
            - not_null
      #- name : order_id
        #description: "Foreign key to the orders table."
        #tests:
          #- relationships:
              #arguments:
                #name: order_id_id_foreign_key_in_stg_local_bike_database__order_items
                #to: ref('stg_local_bike_database__orders')
                #field: order_id
      #- name: product_id
        #description: "Foreign key to the products table."
        #tests:
          #- relationships:
              #arguments:
                #name: product_id_id_foreign_key_in_stg_local_bike_database__order_items
                #to: ref('stg_local_bike_database__products')
                #field: product_id
      - name: quantity
        description: "Quantity of the item order"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
      - name: discount
        description: "Discount on the item order"
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1

  - name: stg_local_bike_database__orders
    description: "This model contains the list of orders."
    columns:
      - name: order_id
        description: "Primary key of the orders table."
        tests:
            - unique
            - not_null
      #- name : customer_id
        #description: "Foreign key to the customers table."
        #tests:
          #- relationships:
              #arguments:
                #name: customer_id_id_foreign_key_in_stg_local_bike_database__orders
                #to: ref('stg_local_bike_database__customers')
                #field: customer_id
      #- name: store_id
        #description: "Foreign key to the stores table."
        #tests:
          #- relationships:
              #arguments:
                #name: store_id_id_foreign_key_in_stg_local_bike_database__orders
                #to: ref('stg_local_bike_database__stores')
                #field: store_id
      #- name: staff_id
        #description: "Foreign key to the staffs table."
        #tests:
          #- relationships:
              #arguments:
                #name: staff_id_id_foreign_key_in_stg_local_bike_database__orders
                #to: ref('stg_local_bike_database__staffs')
                #field: staff_id
      - name : order_status
        description: "Status of the order."
        tests:
          - accepted_values:
              arguments:
                name: accepted_values_order_status
                values: [1,2,3,4]
                quote: false